#DNS settings
port=53
no-resolv

server=8.8.8.8

domain=lab.local
expand-hosts
# Additional hosts file for local entries
addn-hosts=/etc/dnsmasq.hosts

# DHCP settings
interface=eth0
dhcp-option=3,192.168.1.254
dhcp-option=6,192.168.1.254

# dhcp range (min-max IP), lease time
dhcp-range=192.168.1.10,192.168.1.15,1h


